<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitDeck – Receitas Fitness</title>
    <meta name="description"
        content="Descubra receitas fitness saudáveis no estilo baralho interativo. Embaralhe, selecione e adicione suas próprias receitas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
/* ===================================
   FitDeck – Fitness Recipe Card App
   style.css
   =================================== */

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap');

/* ─── CSS Variables ─────────────────────────────── */
:root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #0f1628;
    --bg-surface: #161d35;
    --bg-card: #1a2240;
    --text-primary: #f0f4ff;
    --text-secondary: #8b93b8;
    --text-muted: #4a5480;
    --accent-green: #4ade80;
    --accent-glow: rgba(74, 222, 128, 0.25);
    --cat-breakfast: #f59e0b;
    --cat-lunch: #22c55e;
    --cat-dinner: #a855f7;
    --cat-snack: #38bdf8;
    --border: rgba(255, 255, 255, 0.07);
    --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.6);
    --radius-card: 18px;
    --font-main: 'Outfit', sans-serif;
    --font-display: 'Playfair Display', serif;
    --transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── Reset ─────────────────────────────────────── */
*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: var(--font-main);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74, 222, 128, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 10% 70%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
}

/* ─── Header ─────────────────────────────────────── */
.site-header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
}

.site-header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
    margin: 16px auto 0;
}

.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
}

.logo-icon {
    font-size: 2.4rem;
}

.logo-text {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: -0.5px;
    color: var(--text-primary);
}

.logo-text strong {
    color: var(--accent-green);
    font-weight: 700;
}

.header-tagline {
    font-size: 0.875rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
}

/* ─── App Container ──────────────────────────────── */
.app-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ─── Controls ──────────────────────────────────── */
.controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 20px 0 12px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
    width: 100%;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    font-family: var(--font-main);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.02em;
}

.btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0);
    transition: background 0.2s;
}

.btn:hover::after {
    background: rgba(255, 255, 255, 0.07);
}

.btn:active {
    transform: scale(0.96);
}

.btn:focus-visible {
    outline: 2px solid var(--accent-green);
    outline-offset: 3px;
}

.btn-icon {
    font-size: 1.1em;
}

.btn-primary {
    background: linear-gradient(135deg, #16a34a, #4ade80);
    color: #0a1a0f;
    box-shadow: 0 4px 24px rgba(74, 222, 128, 0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(74, 222, 128, 0.45);
}

.btn-secondary {
    background: var(--bg-surface);
    color: var(--text-primary);
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

.btn-secondary:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}

.btn-accent {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    box-shadow: 0 4px 24px rgba(168, 85, 247, 0.3);
}

.btn-accent:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(168, 85, 247, 0.45);
}

.btn-full {
    width: 100%;
    justify-content: center;
    margin-top: 8px;
}

/* ─── Deck Info ─────────────────────────────────── */
.deck-info {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 16px;
    margin-bottom: 24px;
    text-transform: uppercase;
    position: relative;
    z-index: 10;
    width: 100%;
}

#deck-count {
    color: var(--accent-green);
    font-weight: 700;
    font-size: 1em;
}

/* ─── Deck Wrapper ──────────────────────────────── */
.deck-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    /* height accounts for the fan bleed upward: cards are 360px + rotation spread */
    height: 480px;
    position: relative;
    isolation: isolate;
    /* overflow visible so cards can fan, but they won't touch controls (controls are BELOW) */
    overflow: visible;
}

.deck {
    position: relative;
    width: 300px;
    height: 400px;
    /* pushed toward the bottom of the wrapper so the fan spreads upward cleanly */
    align-self: flex-end;
    margin-bottom: 20px;
}

/* ─── Card ──────────────────────────────────────── */
.card {
    position: absolute;
    width: 240px;
    height: 360px;
    border-radius: var(--radius-card);
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    /* rotate around a point below the card so cards fan upward from a common pivot */
    transform-origin: bottom center;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.3s ease,
        z-index 0s;
    left: 50%;
    bottom: 0;
    top: auto;
    translate: -50% 0;
    user-select: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    border-radius: var(--radius-card) var(--radius-card) 0 0;
}

.card[data-cat="Café da Manhã"]::before {
    background: var(--cat-breakfast);
}

.card[data-cat="Almoço"]::before {
    background: var(--cat-lunch);
}

.card[data-cat="Jantar"]::before {
    background: var(--cat-dinner);
}

.card[data-cat="Lanche"]::before {
    background: var(--cat-snack);
}

.card:hover {
    z-index: 999 !important;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 40px var(--accent-glow);
}

.card:hover .card-inner {
    transform: translateY(-12px) scale(1.02);
}

.card-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 24px 20px 20px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Card emoji area */
.card-emoji-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
}

.card-emoji {
    font-size: 4.5rem;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
    animation: emojiFloat 3s ease-in-out infinite;
}

@keyframes emojiFloat {

    0%,
    100% {
        transform: translateY(0px);
    }

    50% {
        transform: translateY(-6px);
    }
}

.card-category {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
}

.card[data-cat="Café da Manhã"] .card-category {
    background: rgba(245, 158, 11, 0.18);
    color: var(--cat-breakfast);
}

.card[data-cat="Almoço"] .card-category {
    background: rgba(34, 197, 94, 0.18);
    color: var(--cat-lunch);
}

.card[data-cat="Jantar"] .card-category {
    background: rgba(168, 85, 247, 0.18);
    color: var(--cat-dinner);
}

.card[data-cat="Lanche"] .card-category {
    background: rgba(56, 189, 248, 0.18);
    color: var(--cat-snack);
}

/* Card name */
.card-name {
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    color: var(--text-primary);
    margin-bottom: 14px;
}

/* Card macros strip */
.card-macros {
    display: flex;
    justify-content: space-between;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    padding: 10px 12px;
    gap: 4px;
}

.macro-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
}

.macro-val {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-primary);
}

.macro-lbl {
    font-size: 0.58rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 1px;
}

/* Prep time badge */
.card-prep {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

/* Card shimmer overlay */
.card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.06) 50%, transparent 60%);
    transform: skewX(-10deg);
    pointer-events: none;
    transition: left 0.5s;
}

.card:hover::after {
    left: 120%;
    transition: left 0.6s ease;
}

/* Card selected highlight */
.card.selected {
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(74, 222, 128, 0.6) !important;
    border-color: rgba(74, 222, 128, 0.5) !important;
    z-index: 1000 !important;
}

/* Shuffle animation */
@keyframes cardScatter {
    0% {
        transform: var(--base-transform);
    }

    30% {
        transform: translate(var(--scatter-x), var(--scatter-y)) rotate(var(--scatter-r)) scale(0.85);
        opacity: 0.5;
    }

    60% {
        transform: translate(calc(var(--scatter-x) * 0.5), calc(var(--scatter-y) * 0.5)) rotate(calc(var(--scatter-r) * 0.5)) scale(0.95);
        opacity: 0.8;
    }

    100% {
        transform: var(--base-transform);
        opacity: 1;
    }
}

.card.shuffling {
    animation: cardScatter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* ─── Modal Overlay ─────────────────────────────── */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 20, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.open {
    opacity: 1;
    pointer-events: all;
}

/* ─── Modal Base ─────────────────────────────────── */
.modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(30px) scale(0.96);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
    scrollbar-width: thin;
    scrollbar-color: var(--bg-card) transparent;
}

.modal-overlay.open .modal {
    transform: translateY(0) scale(1);
}

.modal-detail {
    max-width: 540px;
}

.modal-add {
    max-width: 620px;
}

.modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.2s;
}

.modal-close:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
}

/* ─── Detail Modal ───────────────────────────────── */
.modal-detail-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
}

.modal-emoji {
    font-size: 4rem;
    line-height: 1;
    flex-shrink: 0;
    background: var(--bg-card);
    width: 80px;
    height: 80px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
}

.modal-category {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--accent-green);
}

.modal-title {
    font-family: var(--font-display);
    font-size: 1.5rem;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 6px;
}

.modal-subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.5;
}

.modal-prep-time {
    font-size: 0.78rem;
    color: var(--text-muted);
}

/* ─── Macro Grid ─────────────────────────────────── */
.macro-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 28px;
}

.macro-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
}

.macro-card .mc-val {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
}

.macro-card .mc-unit {
    font-size: 0.65rem;
    color: var(--text-muted);
    display: block;
}

.macro-card .mc-lbl {
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-top: 4px;
    display: block;
    letter-spacing: 0.04em;
}

.macro-card:nth-child(1) .mc-val {
    color: #fb923c;
}

.macro-card:nth-child(2) .mc-val {
    color: #4ade80;
}

.macro-card:nth-child(3) .mc-val {
    color: #60a5fa;
}

.macro-card:nth-child(4) .mc-val {
    color: #f472b6;
}

/* ─── Modal Sections ─────────────────────────────── */
.modal-section {
    margin-bottom: 22px;
}

.modal-section h3 {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

.ingredient-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.ingredient-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    color: var(--text-primary);
    padding: 8px 12px;
    background: var(--bg-card);
    border-radius: 10px;
    border: 1px solid var(--border);
}

.ingredient-list li::before {
    content: '✓';
    color: var(--accent-green);
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
}

.modal-instructions {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-secondary);
}

/* ─── Add Recipe Form ────────────────────────────── */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 8px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.form-group.full {
    grid-column: 1 / -1;
}

.form-group label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.form-group input,
.form-group select,
.form-group textarea {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: var(--font-main);
    font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.15);
}

.form-group select option {
    background: var(--bg-card);
    color: var(--text-primary);
}

.form-error {
    color: #f87171;
    font-size: 0.82rem;
    min-height: 20px;
    margin-bottom: 8px;
}

/* ─── Spotlight ───────────────────────────────────── */
.spotlight-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9500;
    gap: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.spotlight-overlay.open {
    opacity: 1;
    pointer-events: all;
}

.spotlight-card-container .card {
    position: relative !important;
    left: auto !important;
    top: auto !important;
    translate: none !important;
    transform: none !important;
    width: 280px !important;
    height: 420px !important;
    margin: 0 auto;
    animation: spotlightEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 80px rgba(74, 222, 128, 0.4);
    border-color: rgba(74, 222, 128, 0.4);
    pointer-events: none;
}

.spotlight-card-container .card-emoji {
    font-size: 5.5rem;
}

@keyframes spotlightEnter {
    from {
        opacity: 0;
        transform: rotateY(-90deg) scale(0.5);
    }

    to {
        opacity: 1;
        transform: rotateY(0deg) scale(1);
    }
}

.spotlight-dismiss {
    animation: fadeInUp 0.5s 0.4s both;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ─── Scrollbar ───────────────────────────────────── */
::-webkit-scrollbar {
    width: 6px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: var(--bg-card);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
}

/* ─── Responsive ─────────────────────────────────── */
@media (max-width: 600px) {
    .logo-text {
        font-size: 1.6rem;
    }

    .controls {
        gap: 10px;
    }

    .btn {
        padding: 10px 18px;
        font-size: 0.82rem;
    }

    .deck-wrapper {
        padding: 20px 10px 60px;
        min-height: 420px;
    }

    .card {
        width: 200px;
        height: 300px;
    }

    .card-emoji {
        font-size: 3.5rem;
    }

    .card-name {
        font-size: 0.9rem;
    }

    .macro-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    .modal {
        padding: 24px 20px;
    }

    .modal-detail-header {
        flex-direction: column;
    }
}
</style>
</head>

<body>

    <!-- ========== HEADER ========== -->
    <header class="site-header">
        <div class="logo">
            <span class="logo-icon">🃏</span>
            <span class="logo-text">Fit<strong>Deck</strong></span>
        </div>
        <p class="header-tagline">Embaralhe. Escolha. Alimente-se bem.</p>
    </header>

    <!-- ========== MAIN ========== -->
    <main class="app-container">

        <!-- Card Deck Area -->
        <div class="deck-wrapper" id="deck-wrapper">
            <div class="deck" id="deck"></div>
        </div>

        <!-- Deck counter -->

    <!-- ========== CARD DETAIL MODAL ========== -->

        <div class="modal modal-add">
            <button class="modal-close" id="add-close" aria-label="Fechar">&times;</button>

            <form id="add-recipe-form" novalidate>
                <div class="form-grid">
                    <div class="form-group full">

        <button class="btn btn-secondary spotlight-dismiss" id="spotlight-dismiss">Ver no Baralho</button>
    </div>

    <script>
/**

    },

        instructions: "Bata todos os ingredientes no liquidificador. Cozinhe porções pequenas em frigideira antiaderente, 2-3 min de cada lado. Sirva com mel e frutas."
    },
    {
        id: 12,
        name: "Edamame com Sal Rosa",

    }
];

// ─── State ───────────────────────────────────────────────────────────────────
let recipes = [...INITIAL_RECIPES];
let nextId = INITIAL_RECIPES.length + 1;

// ─── DOM References ───────────────────────────────────────────────────────────
const deckEl = document.getElementById('deck');
const deckCount = document.getElementById('deck-count');
const btnShuffle = document.getElementById('btn-shuffle');
const btnRandom = document.getElementById('btn-random');
const btnAdd = document.getElementById('btn-add');

// Detail modal
const detailModal = document.getElementById('detail-modal');
const detailClose = document.getElementById('detail-close');
const modalEmoji = document.getElementById('modal-emoji');
const modalCategory = document.getElementById('modal-category');
const modalTitle = document.getElementById('modal-title');
const modalPrepTime = document.getElementById('modal-prep-time');
const modalMacros = document.getElementById('modal-macros');
const modalIngredients = document.getElementById('modal-ingredients');
const modalInstructions = document.getElementById('modal-instructions');

// Add modal
const addModal = document.getElementById('add-modal');
const addClose = document.getElementById('add-close');
const addForm = document.getElementById('add-recipe-form');
const formError = document.getElementById('form-error');

// Spotlight
const spotlightOverlay = document.getElementById('spotlight-overlay');
const spotlightContainer = document.getElementById('spotlight-container');
const spotlightDismiss = document.getElementById('spotlight-dismiss');

// ─── Category Configs ────────────────────────────────────────────────────────
const CAT_CONFIG = {
    "Café da Manhã": { icon: "☀️" },
    "Almoço": { icon: "🥗" },
    "Jantar": { icon: "🌙" },
    "Lanche": { icon: "🍎" }
};

// ─── Render Deck ─────────────────────────────────────────────────────────────
function renderDeck() {
    deckEl.innerHTML = '';
    deckCount.textContent = recipes.length;

    const total = recipes.length;
    const MAX_SPREAD_ANGLE = Math.min(28, total * 2.4);

    recipes.forEach((recipe, i) => {
        const t = total === 1 ? 0 : (i / (total - 1)) * 2 - 1; // -1 to +1
        const angle = t * MAX_SPREAD_ANGLE;
        const zIndex = i + 1;

        const card = createCardElement(recipe);

        // Anchor every card at bottom-center of the deck div;
        // rotation around 'bottom center' fans them like a real hand of cards
        card.style.setProperty('--base-transform', `translateX(-50%) rotate(${angle}deg)`);
        card.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        card.style.left = '50%';
        card.style.bottom = '0';
        card.style.top = 'auto';
        card.style.translate = 'none';
        card.style.zIndex = zIndex;

        card.addEventListener('click', () => openDetailModal(recipe));
        deckEl.appendChild(card);
    });
}

// ─── Create Card Element ──────────────────────────────────────────────────────
function createCardElement(recipe) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = recipe.id;
    card.dataset.cat = recipe.category;

    const catIcon = (CAT_CONFIG[recipe.category] || {}).icon || '🍽️';

    card.innerHTML = `
    <div class="card-inner">
      <div class="card-emoji-area">
        <div class="card-emoji">${recipe.emoji}</div>
        <div class="card-category">${catIcon} ${recipe.category}</div>
      </div>
      <div class="card-name">${recipe.name}</div>
      <div class="card-macros">
        <div class="macro-item">
          <span class="macro-val">${recipe.calories}</span>
          <span class="macro-lbl">kcal</span>
        </div>
        <div class="macro-item">
          <span class="macro-val">${recipe.protein}g</span>
          <span class="macro-lbl">Prot</span>
        </div>
        <div class="macro-item">
          <span class="macro-val">${recipe.carbs}g</span>
          <span class="macro-lbl">Carb</span>
        </div>
        <div class="macro-item">
          <span class="macro-val">${recipe.fat}g</span>
          <span class="macro-lbl">Gord</span>
        </div>
      </div>
      ${recipe.prepTime ? `<div class="card-prep">⏱ ${recipe.prepTime} min de preparo</div>` : ''}
    </div>
  `;

    return card;
}

// ─── Open Detail Modal ────────────────────────────────────────────────────────
function openDetailModal(recipe) {
    const catIcon = (CAT_CONFIG[recipe.category] || {}).icon || '🍽️';

    modalEmoji.textContent = recipe.emoji;
    modalCategory.textContent = `${catIcon} ${recipe.category}`;
    modalTitle.textContent = recipe.name;
    modalPrepTime.textContent = recipe.prepTime ? `⏱ ${recipe.prepTime} min de preparo` : '';

    // Macros grid
    modalMacros.innerHTML = `
    <div class="macro-card">
      <span class="mc-val">${recipe.calories}</span>
      <span class="mc-unit">kcal</span>
      <span class="mc-lbl">Calorias</span>
    </div>
    <div class="macro-card">
      <span class="mc-val">${recipe.protein}g</span>
      <span class="mc-unit">por porção</span>
      <span class="mc-lbl">Proteína</span>
    </div>
    <div class="macro-card">
      <span class="mc-val">${recipe.carbs}g</span>
      <span class="mc-unit">por porção</span>
      <span class="mc-lbl">Carboidrato</span>
    </div>
    <div class="macro-card">
      <span class="mc-val">${recipe.fat}g</span>
      <span class="mc-unit">por porção</span>
      <span class="mc-lbl">Gordura</span>
    </div>
  `;

    // Ingredients
    modalIngredients.innerHTML = recipe.ingredients
        .map(ing => `<li>${ing}</li>`)
        .join('');

    modalInstructions.textContent = recipe.instructions;

    openModal(detailModal);
}

// ─── Modal Helpers ────────────────────────────────────────────────────────────
function openModal(el) {
    el.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal(el) {
    el.classList.remove('open');
    document.body.style.overflow = '';
}

// ─── Shuffle ──────────────────────────────────────────────────────────────────
function shuffleDeck() {
    const cards = Array.from(deckEl.querySelectorAll('.card'));

    // Animate scatter
    cards.forEach(card => {
        const scatterX = (Math.random() - 0.5) * 400;
        const scatterY = (Math.random() - 0.5) * 300;
        const scatterR = (Math.random() - 0.5) * 120;

        card.style.setProperty('--scatter-x', `${scatterX}px`);
        card.style.setProperty('--scatter-y', `${scatterY}px`);
        card.style.setProperty('--scatter-r', `${scatterR}deg`);
        card.classList.add('shuffling');
    });

    // Fisher-Yates shuffle
    for (let i = recipes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [recipes[i], recipes[j]] = [recipes[j], recipes[i]];
    }

    // Re-render after animation
    setTimeout(() => {
        cards.forEach(card => card.classList.remove('shuffling'));
        renderDeck();
    }, 850);

    // Disable button during animation
    btnShuffle.disabled = true;
    setTimeout(() => { btnShuffle.disabled = false; }, 900);
}

// ─── Random Pick ──────────────────────────────────────────────────────────────
function pickRandom() {
    if (recipes.length === 0) return;

    const randomIndex = Math.floor(Math.random() * recipes.length);
    const recipe = recipes[randomIndex];

    // Build a card clone for spotlight
    const cardClone = createCardElement(recipe);
    spotlightContainer.innerHTML = '';
    spotlightContainer.appendChild(cardClone);

    spotlightOverlay.classList.add('open');
}

// ─── Add Recipe ───────────────────────────────────────────────────────────────
function handleAddRecipe(e) {
    e.preventDefault();
    formError.textContent = '';

    const name = document.getElementById('f-name').value.trim();
    const category = document.getElementById('f-category').value;
    const emoji = document.getElementById('f-emoji').value.trim() || '🍽️';
    const calories = parseInt(document.getElementById('f-calories').value);
    const protein = parseInt(document.getElementById('f-protein').value);
    const carbs = parseInt(document.getElementById('f-carbs').value);
    const fat = parseInt(document.getElementById('f-fat').value);
    const prepTime = parseInt(document.getElementById('f-preptime').value) || null;
    const ingredRaw = document.getElementById('f-ingredients').value.trim();
    const instructions = document.getElementById('f-instructions').value.trim();

    // Validation
    if (!name) { formError.textContent = '⚠️ Nome da receita é obrigatório.'; return; }
    if (!category) { formError.textContent = '⚠️ Selecione uma categoria.'; return; }
    if (!calories || isNaN(calories)) { formError.textContent = '⚠️ Informe as calorias.'; return; }
    if (isNaN(protein) || isNaN(carbs) || isNaN(fat)) {
        formError.textContent = '⚠️ Preencha todos os macronutrientes.'; return;
    }
    if (!ingredRaw) { formError.textContent = '⚠️ Informe os ingredientes.'; return; }
    if (!instructions) { formError.textContent = '⚠️ Informe o modo de preparo.'; return; }

    const ingredients = ingredRaw.split('\n').map(l => l.trim()).filter(Boolean);

    const newRecipe = {
        id: nextId++,
        name, category, emoji, calories, protein, carbs, fat,
        prepTime, ingredients, instructions
    };

    recipes.push(newRecipe);
    renderDeck();
    closeModal(addModal);
    addForm.reset();

    // Scroll to new card and highlight it
    setTimeout(() => {
        const newCard = deckEl.querySelector(`[data-id="${newRecipe.id}"]`);
        if (newCard) {
            newCard.classList.add('selected');
            setTimeout(() => newCard.classList.remove('selected'), 2000);
        }
    }, 100);
}

// ─── Event Listeners ──────────────────────────────────────────────────────────
btnShuffle.addEventListener('click', shuffleDeck);
btnRandom.addEventListener('click', pickRandom);
btnAdd.addEventListener('click', () => openModal(addModal));

detailClose.addEventListener('click', () => closeModal(detailModal));
addClose.addEventListener('click', () => closeModal(addModal));
addForm.addEventListener('submit', handleAddRecipe);

// Close modals on overlay click
detailModal.addEventListener('click', (e) => {
    if (e.target === detailModal) closeModal(detailModal);
});
addModal.addEventListener('click', (e) => {
    if (e.target === addModal) closeModal(addModal);
});

// Spotlight dismiss
spotlightDismiss.addEventListener('click', () => {
    spotlightOverlay.classList.remove('open');
});
spotlightOverlay.addEventListener('click', (e) => {
    if (e.target === spotlightOverlay) spotlightOverlay.classList.remove('open');
});

// Keyboard: close modals with Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeModal(detailModal);
        closeModal(addModal);
        spotlightOverlay.classList.remove('open');
    }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderDeck();

</script>
